<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Architecture Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; background-color: #121212; color: #fff; padding: 20px; }
        input, button { padding: 8px; margin: 5px 0; background: #333; color: white; border: 1px solid #555; }
        button { cursor: pointer; background: #444; }
        button:hover { background: #555; }
        #chatArea { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }
        #logs { background: #1e1e1e; padding: 10px; height: 250px; overflow-y: scroll; margin-bottom: 10px; border: 1px solid #333; }
        .system { color: #888; }
        .room { color: #4CAF50; }
        .chat { color: #2196F3; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h2>Room Management Node</h2>
    
    <div id="lobbyArea">
        <button onclick="createRoom()">Create New Room</button>
        <br><br>
        <input type="text" id="roomInput" placeholder="Enter 6-char Room Code">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div id="roomInfo" style="margin-top: 20px; font-weight: bold; color: #ffeb3b;"></div>
    <div id="gameArea" style="display: none; margin-top: 20px; border: 1px solid #ff9800; padding: 10px;">
        <button id="startBtn" onclick="startGame()">Start Game</button>
        <h3 id="timerDisplay" style="color: #ff9800;">Time: 60</h3>
        <h3 id="wordDisplay">Word: Waiting...</h3>
        <h4 id="roleDisplay">Role: Guesser</h4>
    </div>
    <div id="leaderboard" style="float: right; width: 150px; background: #222; padding: 10px; border: 1px solid #444;">
        <h4>Scores</h4>
        <ul id="scoreList" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>
    <div id="canvasArea" style="display: none; margin-top: 20px;">
        <canvas id="gameCanvas" width="600" height="400" style="background: white; border: 2px solid #333; cursor: crosshair;"></canvas>
        <br>
        <button id="clearBtn" onclick="requestClearCanvas()">Clear Canvas</button>
    </div>

    <div id="chatArea">
        <div id="logs"></div>
        <input type="text" id="msgInput" placeholder="Type message here...">
        <button onclick="sendMessage()">Send to Room</button>
    </div>

    <script>
        const socket = io("http://localhost:3001");
        
        // DOM Elements
        const logsDiv = document.getElementById('logs');
        const lobbyArea = document.getElementById('lobbyArea');
        const chatArea = document.getElementById('chatArea');
        const roomInfo = document.getElementById('roomInfo');

        // Helper to print colored logs
        function logMessage(msg, type = 'system') {
            logsDiv.innerHTML += `<div class="${type}">${msg}</div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // Socket Connection
        socket.on("connect", () => {
            logMessage(`[Connected] Socket ID: ${socket.id}`, 'system');
        });

        // Room Events
        socket.on("room_created", (data) => {
            roomInfo.innerText = `Hosting Room: ${data.roomCode}`;
            logMessage(`[Success] Room created: ${data.roomCode}`, 'room');
            enterRoomUI();  
        });

        socket.on("room_joined", (data) => {
            roomInfo.innerText = `Connected to Room: ${data.roomCode}`;
            logMessage(`[Success] Joined room: ${data.roomCode}`, 'room');
            enterRoomUI();
        });

        socket.on("game_over", () => {
            startBtn.style.display = 'block';
            roleDisplay.innerText = "Role: Waiting to start...";
            wordDisplay.innerText = "Word: Waiting...";
            timerDisplay.innerText = "Time: --";
        });
        socket.on("player_joined", (data) => {
            logMessage(`[Event] Player ${data.playerId} joined. (${data.playerCount}/5)`, 'room');
        });

        socket.on("player_left", (data) => {
            logMessage(`[Event] Player ${data.playerId} disconnected. (${data.playerCount}/5)`, 'room');
        });

        // Chat Events
        socket.on("receive_message", (data) => {
            const senderName = data.sender === socket.id ? "You" : data.sender.substring(0,5);
            logMessage(`[${senderName}]: ${data.text}`, 'chat');
        });

        socket.on("error", (data) => {
            logMessage(`[Error] ${data.message}`, 'error');
            alert(data.message);
        });

        // Emit Actions
        function createRoom() {
            socket.emit("create_room");
        }

        function joinRoom() {
            const code = document.getElementById('roomInput').value.trim();
            if (!code) return alert("Room code cannot be empty.");
            socket.emit("join_room", { roomCode: code });
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            socket.emit("send_message", { text: input.value.trim() });
            input.value = '';
        }
        // New DOM Elements
        const gameArea = document.getElementById('gameArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const wordDisplay = document.getElementById('wordDisplay');
        const roleDisplay = document.getElementById('roleDisplay');
        const startBtn = document.getElementById('startBtn');

        // Update enterRoomUI to show the game area
        function enterRoomUI() {
            lobbyArea.style.display = 'none';
            chatArea.style.display = 'block';
            gameArea.style.display = 'block';
            document.getElementById('canvasArea').style.display = 'block';
        }

        function startGame() {
            socket.emit("start_game");
        }

        // Game Loop Events
        socket.on("round_start", (data) => {
            startBtn.style.display = 'none'; // Hide start button once game begins
            logsDiv.innerHTML = ''; // Clear chat for new round
            
            if (socket.id === data.drawerId) {
                roleDisplay.innerText = "Role: You are DRAWING!";
                roleDisplay.style.color = "#4CAF50";
            } else {
                roleDisplay.innerText = "Role: You are GUESSING!";
                roleDisplay.style.color = "#2196F3";
                wordDisplay.innerText = `Word: ${"_ ".repeat(data.wordLength)}`;
            }
            logMessage(`[System] Round started!`, 'system');
        });

        socket.on("drawer_word", (data) => {
            wordDisplay.innerText = `Word to draw: ${data.word}`;
        });

        socket.on("time_update", (data) => {
            timerDisplay.innerText = `Time: ${data.timeLeft}`;
        });

        socket.on("round_end", (data) => {
            logMessage(`[System] Round over! The word was: ${data.word}`, 'room');
            wordDisplay.innerText = `Word: ${data.word}`;
        });

        // --- CANVAS & THROTTLING LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let isMyTurn = false; // Prevents guessers from drawing
        let lastX = 0;
        let lastY = 0;

        // The throttling queue
        let drawBatchQueue = [];

        // Stroke styling
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';

        // Event Listeners for drawing
        canvas.addEventListener('mousedown', (e) => {
            if (!isMyTurn) return;
            isDrawing = true;
            [lastX, lastY] = getMousePos(e);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || !isMyTurn) return;
            
            const [currentX, currentY] = getMousePos(e);
            
            // 1. Draw locally instantly
            drawLine(lastX, lastY, currentX, currentY);
            
            // 2. Push to batch queue instead of emitting immediately
            drawBatchQueue.push({ x0: lastX, y0: lastY, x1: currentX, y1: currentY });
            
            [lastX, lastY] = [currentX, currentY];
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        // Helper to get relative mouse position inside the canvas
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return [evt.clientX - rect.left, evt.clientY - rect.top];
        }

        function drawLine(x0, y0, x1, y1) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.stroke();
            ctx.closePath();
        }

        // THE THROTTLE LOOP: Runs every 30ms. 
        // If there is data in the queue, emit it and clear the queue.
        setInterval(() => {
            if (drawBatchQueue.length > 0) {
                socket.emit('draw_data', drawBatchQueue);
                drawBatchQueue = []; // Empty the queue after sending
            }
        }, 30);

        // --- SOCKET LISTENERS FOR CANVAS ---

        // Receive batched lines from the drawer
        socket.on('draw_data', (batch) => {
            // Loop through the batch and draw each segment
            batch.forEach(segment => {
                drawLine(segment.x0, segment.y0, segment.x1, segment.y1);
            });
        });

        socket.on('clear_canvas', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function requestClearCanvas() {
            if (!isMyTurn) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear_canvas');
        }

        // Update the round_start listener to unlock/lock the canvas
        socket.on("round_start", (data) => {
            startBtn.style.display = 'none';
            logsDiv.innerHTML = '';
            
            if (socket.id === data.drawerId) {
                isMyTurn = true; // Unlock canvas
                roleDisplay.innerText = "Role: You are DRAWING!";
                roleDisplay.style.color = "#4CAF50";
            } else {
                isMyTurn = false; // Lock canvas
                roleDisplay.innerText = "Role: You are GUESSING!";
                roleDisplay.style.color = "#2196F3";
                wordDisplay.innerText = `Word: ${"_ ".repeat(data.wordLength)}`;
            }
            logMessage(`[System] Round started!`, 'system');
        });

        const scoreList = document.getElementById('scoreList');

        // Listen for directed system messages (like "You are close!" or cheat warnings)
        socket.on("system_message", (data) => {
            logMessage(`[System] ${data.text}`, data.type);
        });

        // Update the leaderboard UI
        socket.on("update_scores", (scores) => {
            scoreList.innerHTML = '';
            // Sort scores descending
            const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            sortedScores.forEach(([id, score]) => {
                const name = id === socket.id ? "You" : id.substring(0,5);
                const li = document.createElement('li');
                li.innerText = `${name}: ${score}`;
                scoreList.appendChild(li);
            });
        });
    </script>
</body>
</html>
